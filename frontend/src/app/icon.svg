<svg
  width="32"
  height="32"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- High-Contrast Neon Volt Green Gradient -->
  <linearGradient id="apexRedGrad" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stopColor="#e5ff00" />
    <stop offset="50%" stopColor="#9dff00" />
    <stop offset="100%" stopColor="#059669" />
  </linearGradient>

  <!-- Electric Cyan-Blue Telemetry Gradient -->
  <linearGradient id="telemetryBlueGrad" x1="80" y1="20" x2="20" y2="80" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stopColor="#00f0ff" />
    <stop offset="100%" stopColor="#0066ff" />
  </linearGradient>

  <!-- Orbit Telemetry Rings -->
  <circle
    cx="50"
    cy="50"
    r="42"
    stroke="url(#telemetryBlueGrad)"
    strokeWidth="3.5"
    strokeDasharray="6 8"
    strokeOpacity="0.7"
  />

  <!-- Sweeping Neon Telemetry Racing Curve -->
  <path
    d="M 12 78 C 28 45, 52 30, 88 22"
    stroke="url(#telemetryBlueGrad)"
    strokeWidth="9"
    strokeLinecap="round"
  />

  <!-- The Delta Apex Chevron -->
  <path
    d="M 50 15 L 84 76 L 68 76 L 50 40 L 32 76 L 16 76 Z"
    fill="url(#apexRedGrad)"
    stroke="#ffffff"
    strokeWidth="2.5"
    strokeLinejoin="round"
  />

  <!-- Bright White Central Core Node -->
  <circle
    cx="50"
    cy="50"
    r="6"
    fill="#ffffff"
    stroke="#00f0ff"
    strokeWidth="2.5"
  />
</svg>
