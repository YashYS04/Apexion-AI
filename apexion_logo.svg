<svg
  width="512"
  height="512"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    .spin-ring {
      transform-origin: center;
      animation: rotate 20s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <defs>
    <!-- High-Contrast Midnight Emerald Gradient -->
    <linearGradient id="apexRedGrad" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#7FFFD4" />
      <stop offset="100%" stopColor="#00C389" />
    </linearGradient>

    <!-- High-Contrast Telemetry Mint Gradient -->
    <linearGradient id="telemetryBlueGrad" x1="80" y1="20" x2="20" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#7FFFD4" />
      <stop offset="100%" stopColor="#008c5c" />
    </linearGradient>

    <!-- Intense Neon Glow Filter -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient dark space background matching Midnight Emerald -->
  <rect width="100" height="100" rx="16" fill="#0F1115" />

  <!-- Orbit Telemetry Rings -->
  <circle
    cx="50"
    cy="50"
    r="42"
    stroke="url(#telemetryBlueGrad)"
    strokeWidth="2.5"
    strokeDasharray="6 8"
    strokeOpacity="0.6"
    class="spin-ring"
  />

  <!-- Sweeping Neon Telemetry Racing Curve -->
  <path
    d="M 12 78 C 28 45, 52 30, 88 22"
    stroke="url(#telemetryBlueGrad)"
    strokeWidth="6"
    strokeLinecap="round"
    filter="url(#neonGlow)"
    opacity="0.95"
  />

  <!-- The Delta Apex Chevron -->
  <path
    d="M 50 15 L 84 76 L 68 76 L 50 40 L 32 76 L 16 76 Z"
    fill="url(#apexRedGrad)"
    filter="url(#neonGlow)"
    stroke="#ffffff"
    strokeWidth="1.2"
    strokeLinejoin="round"
  />

  <!-- Bright White Central Core Node -->
  <circle
    cx="50"
    cy="50"
    r="5.5"
    fill="#ffffff"
    stroke="#7FFFD4"
    strokeWidth="1.8"
    filter="url(#neonGlow)"
  />
</svg>
